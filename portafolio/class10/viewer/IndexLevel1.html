<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My game</title>
    <link rel="icon" type="image/png" href="../../../src/img/computer_icon.png">

    <!--Import Bootstrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="../src/css/main.css">

    <!--ImportThreejs-->
    <script type="importmap">
    {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.183.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.0/examples/jsm/",
                "lil-gui": "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.js"

            }
        }
    </script>
</head>

<body>
    <!--
    navbar
    -->
    <section id="navbar">

        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <div class="container-fluid">

                <!--Icono y texto a la izquierda-->
                <a class="navbar-brand" href="/index.html">
                    <img src="../../../src/img/computer_icon.png" alt="Logo" width="24" height="24"
                        class="d-inline-block align-text-top">
                    Computer Graphics
                </a>

                <!--Boton responsive de bootstrap-->
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false"
                    aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

            </div>
        </nav>
    </section>





    <section>

        <div>
            <script type="module" src="../src/js/mainLevel1.js"></script>
        </div>

    </section>

    <div id="Instructions">
        <h2>Modo PointerLock Activo</h2>
        <p>Haz clic en la ecena para bloquear el cursor y activar el modo de primera persona</p>
        <p><b>W, A, S, D </b>para moverse<br> <b>ESC</b> para desbloquear el cursor</p>
    </div>

    <div id="info-panel">
        <h3 id="control-title">OrbitControls</h3>
        <p id="control-desc">Cargando descripción...</p>
    </div>




    <audio loop autoplay id="audioNewGame">
        <source src="../src/sounds/sound_game.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <script src="../src/js/mainAudio.js"></script>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
